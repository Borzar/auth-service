name: Conectividad e Integración Continua (CI)

# Esta pipeline se ejecuta en la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Usamos un servidor virtual con Linux Ubuntu garantizado por GitHub
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código fuente del repositorio en el servidor de GitHub
    - name: Descargar código fuente
      uses: actions/checkout@v4

    # 2. Configurar el motor de Docker en el servidor virtual
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Construir la imagen de Docker
    # ¡Aquí ocurre la magia! Al ejecutar docker build, se disparará tu 'test-stage'.
    # Si un test falla, el comando 'docker build' devolverá un código de error
    # y GitHub Actions detendrá el pipeline inmediatamente, marcándolo con una "X" roja.
    - name: Construir imagen de Docker y Ejecutar Tests
      run: |
        docker build -t auth-service:${{ github.sha }} .